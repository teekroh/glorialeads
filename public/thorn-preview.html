// ─── Helpers ─────────────────────────────────────────────────────────────────

function daysUntil(dateStr: string): number | null {
  if (!dateStr) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const target = new Date(dateStr + "T00:00:00");
  const diff = Math.round((target.getTime() - today.getTime()) / 86400000);
  return diff;
}

function trainingPhase(daysLeft: number | null): string {
  if (daysLeft === null) return "";
  if (daysLeft < 0) return "post-race";
  if (daysLeft <= 7) return "race week";
  if (daysLeft <= 21) return "taper";
  if (daysLeft <= 56) return "peak";
  if (daysLeft <= 120) return "build";
  return "base";
}

function formatDist(mi: number) {
  return `${mi}mi / ${Math.round(mi * 1.60934)}km`;
}

function formatElev(ft: number) {
  return `+${ft.toLocaleString()}ft / ${Math.round(ft * 0.3048).toLocaleString()}m`;
}

// ─── Training week ────────────────────────────────────────────────────────────

const DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"] as const;

function buildWeek(
  phase: string,
  goalType: string,
  distanceMi: number
): { day: string; workout: string; emphasis: "easy" | "hard" | "long" | "rest" | "race" }[] {
  const isLong = distanceMi >= 50;

  const weeksByPhase: Record<
    string,
    { day: string; workout: string; emphasis: "easy" | "hard" | "long" | "rest" | "race" }[]
  > = {
    base: [
      { day: "Mon", workout: "rest or 30 min yoga / mobility", emphasis: "rest" },
      { day: "Tue", workout: "6 mi easy + strides × 6", emphasis: "easy" },
      { day: "Wed", workout: "8 mi aerobic trail", emphasis: "easy" },
      { day: "Thu", workout: goalType === "target pace" ? "10 × 1 min hill reps" : "60 min easy", emphasis: goalType === "target pace" ? "hard" : "easy" },
      { day: "Fri", workout: "4 mi shakeout + drills", emphasis: "easy" },
      { day: "Sat", workout: isLong ? "20 mi long trail" : "14 mi long trail", emphasis: "long" },
      { day: "Sun", workout: "6 mi recovery", emphasis: "easy" },
    ],
    build: [
      { day: "Mon", workout: "rest or 20 min stretch", emphasis: "rest" },
      { day: "Tue", workout: goalType === "target pace" ? "12 × 2 min uphill threshold" : "8 mi aerobic", emphasis: goalType === "target pace" ? "hard" : "easy" },
      { day: "Wed", workout: "10 mi with 2k vert", emphasis: "easy" },
      { day: "Thu", workout: goalType === "target pace" ? "5 mi tempo @ goal marathon pace" : "90 min easy + HR check", emphasis: goalType === "target pace" ? "hard" : "easy" },
      { day: "Fri", workout: "5 mi easy + strides", emphasis: "easy" },
      { day: "Sat", workout: isLong ? "28 mi back-to-back day 1" : "18 mi long", emphasis: "long" },
      { day: "Sun", workout: isLong ? "14 mi back-to-back day 2" : "8 mi recovery", emphasis: "long" },
    ],
    peak: [
      { day: "Mon", workout: "rest — ice + nutrition focus", emphasis: "rest" },
      { day: "Tue", workout: goalType === "target pace" ? "8 × 3 min uphill @ controlled threshold" : "10 mi aerobic + nutrition practice", emphasis: goalType === "target pace" ? "hard" : "easy" },
      { day: "Wed", workout: "14 mi with race-simulation section", emphasis: "easy" },
      { day: "Thu", workout: goalType === "target pace" ? "6 mi at goal pace" : "8 mi incl. night running 45 min", emphasis: goalType === "target pace" ? "hard" : "hard" },
      { day: "Fri", workout: "6 mi shakeout — nothing heroic", emphasis: "easy" },
      { day: "Sat", workout: isLong ? "32 mi race-sim long run" : "22 mi race-sim", emphasis: "long" },
      { day: "Sun", workout: "10 mi recovery + gear check", emphasis: "easy" },
    ],
    taper: [
      { day: "Mon", workout: "rest or 20 min walk", emphasis: "rest" },
      { day: "Tue", workout: "6 mi easy — just spin the legs", emphasis: "easy" },
      { day: "Wed", workout: "5 mi with 4 × 30 sec strides", emphasis: "easy" },
      { day: "Thu", workout: "4 mi easy — trust the process", emphasis: "easy" },
      { day: "Fri", workout: "20 min shakeout + pack drop bag", emphasis: "rest" },
      { day: "Sat", workout: "20 min easy + race bib pickup", emphasis: "rest" },
      { day: "Sun", workout: "rest — early bedtime if start is AM", emphasis: "rest" },
    ],
    "race week": [
      { day: "Mon", workout: "full rest — hydrate, carb load begins", emphasis: "rest" },
      { day: "Tue", workout: "15 min easy shakeout max", emphasis: "rest" },
      { day: "Wed", workout: "15 min easy — gear check", emphasis: "rest" },
      { day: "Thu", workout: "rest — sleep priority", emphasis: "rest" },

      { day: "Sat", workout: "RACE DAY — execute your plan", emphasis: "race" },

      { day: "Tue", workout: "rest or gentle walk", emphasis: "rest" },

// ─── Coach AI ──────────────────────────────────────────────────────────────────

function getCoachReply(
  question: string,
  race: RaceData,
  goalType: string,
  targetPace: string,
  daysLeft: number | null,
  phase: string
): string {
  const q = question.toLowerCase();
  const raceCtx = `${race.name} (${race.type}, ${formatDist(race.distanceMi)}, ${formatElev(race.elevationGainFt)})`;
  const phaseCtx = daysLeft !== null ? `${daysLeft}d out — ${phase} phase` : "";

  if (q.match(/taper|rest|cut.*back|reduce/)) {
    return `coach: for ${race.name} you enter taper ~3 weeks out. Drop volume 30% week 1, 50% week 2, 70% week 3 — but keep intensity with short strides so your legs stay sharp. ${phaseCtx ? `You are currently ${phaseCtx}.` : ""}`;
  }
  if (q.match(/pace|how fast|time goal|finish time/)) {
    if (goalType === "target pace") {
      return `coach: targeting ${targetPace} for ${race.name} (${race.distanceMi}mi). Keep 80% of training at easy aerobic effort — the pace goal lives in quality sessions only. Reassess at ${Math.round(race.distanceMi * 0.6)}mi if conditions deviate.`;
    }
    return `coach: for a finish goal at ${race.name} — go out conservative, don't let adrenaline pull you sub-target in the first 20%. Walk the steep climbs early. Your ${phase} fitness is what it is; trust the training.`;
  }
  if (q.match(/fuel|nutrition|eat|calorie|gel|sodium|electrolyte/)) {
    return `coach: for ${raceCtx} — plan 200–300 cal/hr after hour 1. Practice your exact race-day nutrition in long runs now. Don't try anything new on race day. Sodium 500–1000mg/hr in heat; more at ${race.country.includes("CA") || race.country.includes("AZ") ? "Javelina / desert" : "altitude / UTMB"} conditions.`;
  }
  if (q.match(/injur|pain|sore|hurt|knee|ankle|shin|hamstring|calf/)) {
    return `coach: with ${daysLeft ?? "??"} days to ${race.name} — RICE protocol for 48h then re-evaluate. A 3-day rest now costs much less than missing the race. Flag any swelling or weight-bearing pain immediately to a physio. Don't train through sharp localized pain.`;
  }
  if (q.match(/gear|shoe|vest|pole|pack|drop bag|drop-bag/)) {
    return `coach: for ${race.name} (${race.distanceMi}mi, ${formatElev(race.elevationGainFt)}) — test your full kit on the next 2 long runs. Nothing new race day. For ${race.distanceMi >= 50 ? "ultras: mandatory gear list, poles if allowed and you're comfortable with them, headlamp with spare battery" : "50K range: vest, 500ml soft flasks, headlamp for cutoff buffer"}.`;
  }
  if (q.match(/vert|elevation|climb|mountain|altitude|gain/)) {
    return `coach: ${race.name} has ${formatElev(race.elevationGainFt)} — that's ${race.elevationGainFt >= 20000 ? "serious Alps-level vertical. Train on real climbs weekly" : "manageable if you get consistent vertical in your long runs"}. Power-hiking efficiency matters more than running pace on steep grades over 15%.`;
  }
  if (q.match(/week|today|workout|train|session/)) {
    return `coach: ${phaseCtx ? `${phaseCtx} — ` : ""}priority this week is ${phase === "base" ? "aerobic base. Keep HR zone 2" : phase === "build" ? "volume + vertical. Hit your back-to-back weekend" : phase === "peak" ? "peak long run + race simulation section" : phase === "taper" ? "trust the taper. Volume down, sharpness maintained" : "rest and execute your plan"}.`;
  }
  if (q.match(/sleep|recover|night|rest/)) {
    return `coach: sleep is training. 8–9h if you can get it — this is where adaptation happens. In taper, some athletes sleep worse (normal). Don't compensate with extra easy miles. ${race.distanceMi >= 50 ? "Practice a night run or two before race day — night sections at UTMB/Jav are where races are won and lost." : ""}`;
  }
  if (q.match(/strava|segment|kom|pr|speed/)) {
    return `coach: don't Strava yourself into the ground during ${phase}. ${phase === "base" || phase === "build" ? "Easy days need to be easy — segment hunting breaks periodization." : "This close to race day, every unnecessary effort costs recovery."}`;
  }
  return `coach: ${race.name} (${raceCtx}), ${phaseCtx} — stay consistent. The biggest risk now is doing too much. Trust the process, execute your plan, and keep asking questions.`;
}

// ─── Dragging ─────────────────────────────────────────────────────────────────

type Pos = { x: number; y: number };

function useDraggable(defaultPos: Pos) {
  const [pos, setPos] = useState<Pos>(defaultPos);
  const ref = useRef<Pos>(defaultPos);
  ref.current = pos;

  function onMouseDown(e: React.MouseEvent) {
    if ((e.target as HTMLElement).closest("select,button,input,label,a")) return;
    const startX = e.clientX;
    const startY = e.clientY;
    const origX = ref.current.x;
    const origY = ref.current.y;
    const onMove = (ev: MouseEvent) =>
      setPos({ x: origX + ev.clientX - startX, y: origY + ev.clientY - startY });
    const onUp = () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    e.preventDefault();
  }

  return { pos, setPos, onMouseDown };
}

  );

      return "transportaysh / bed: Geneva → Chamonix · lodging block needed";

  const coachReply = (q: string) =>

  // Mount + position corrections
  useEffect(() => {
    setMounted(true);
    const w = window.innerWidth;
    const h = window.innerHeight;
    coachDrag.setPos({ x: Math.round(w * 0.37 - 290), y: Math.round(h * 0.55) });
    chatDrag.setPos({ x: Math.round(w * 0.96 - 340), y: Math.round(h * 0.52) });
    topRightDrag.setPos({ x: w - 260, y: 20 });
    authDrag.setPos({ x: w - 460, y: 200 });

  // localStorage persistence
  useEffect(() => {
    try {
      const saved = localStorage.getItem("thorn-settings");
      if (saved) {
        const s = JSON.parse(saved) as Record<string, string>;
        if (s.primaryRaceName) setPrimaryRaceName(s.primaryRaceName);
        if (s.supportRaceName) setSupportRaceName(s.supportRaceName);

        if (s.targetPace) setTargetPace(s.targetPace);
      }
    } catch { /* ignore */ }
  }, []);

  useEffect(() => {
    if (!mounted) return;
    try {
      localStorage.setItem(
        "thorn-settings",
        JSON.stringify({ primaryRaceName, supportRaceName, goalType, targetPace })
      );
    } catch { /* ignore */ }
  }, [primaryRaceName, supportRaceName, goalType, targetPace, mounted]);

  // Strava profile photo
  useEffect(() => {
    if (!loggedIn) {
      setStravaProfilePhotoUrl(null);
      setProfilePicObjectPos("50% 50%");
      setProfilePicSize(176);
      return;
    }
    setStravaProfilePhotoUrl("/strava-profile-placeholder.jpg");
  }, [loggedIn]);

  // Face detection on profile pic
  useEffect(() => {
    if (!loggedIn || !stravaProfilePhotoUrl) return;
    let cancelled = false;

    async function detectFace() {
      const image = new Image();
      image.src = stravaProfilePhotoUrl!;
      await image.decode().catch(() => null);

      const FD = (window as any).FaceDetector as
        | (new (opts?: { fastMode?: boolean; maxDetectedFaces?: number }) => {
            detect: (src: CanvasImageSource) => Promise<{ boundingBox: { x: number; y: number; width: number; height: number } }[]>;
          })
        | undefined;

      if (!FD || cancelled) return;

      try {
        const detector = new FD({ fastMode: true, maxDetectedFaces: 1 });
        const faces = await detector.detect(image);
        if (!faces.length || cancelled) return;
        const face = faces[0].boundingBox;
        const x = ((face.x + face.width / 2) / image.naturalWidth) * 100;
        const y = ((face.y + face.height / 2) / image.naturalHeight) * 100;
        const ratio = face.width / image.naturalWidth;
        const scale = Math.max(0.95, Math.min(2.1, 0.34 / ratio));
        const nextSize = Math.round(176 * scale);
        const hx = charDrag.pos.x + 256;
        const hy = charDrag.pos.y === -1 ? 630 : charDrag.pos.y + 146;
        setProfilePicObjectPos(`${x}% ${y}%`);
        setProfilePicSize(nextSize);
        profilePicDrag.setPos({ x: hx - nextSize / 2, y: hy - nextSize / 2 });
      } catch {
        setProfilePicObjectPos("50% 50%");
        setProfilePicSize(176);
        profilePicDrag.setPos({
          x: charDrag.pos.x + 168,
          y: charDrag.pos.y === -1 ? 542 : charDrag.pos.y + 58,
        });
      }
    }

    void detectFace();
    return () => { cancelled = true; };

  // Don't render panels before positions are corrected
  if (!mounted) {
    return (
      <main
        className="relative min-h-screen w-screen overflow-hidden bg-[#f2f2f2]"
        style={SERIF}
      />
    );
  }

    easy: "bg-transparent",
    hard: "bg-black text-white",
    long: "bg-transparent underline",
    race: "bg-black text-white",
  };

  return (
    <main

    >
      {/* ── Thorn logo ─────────────────────────────────────────────────── */}
      {/* eslint-disable-next-line @next/next/no-img-element */}
      <img
        src="/logo_thorn.png"
        alt="Thorn"
        className="pointer-events-none absolute left-1/2 -top-40 z-20 w-[min(90vw,1600px)] -translate-x-1/2 select-none"
        draggable={false}
      />

      {/* ── Top-right cannon image ──────────────────────────────────────── */}
      {/* eslint-disable-next-line @next/next/no-img-element */}
      <img
        src="/top-right-image.png"
        alt=""
        aria-hidden
        className="absolute z-30 w-[280px] -rotate-[5deg] select-none cursor-grab active:cursor-grabbing"
        style={{
          left: topRightDrag.pos.x,
          top: topRightDrag.pos.y,
          filter: "grayscale(1) contrast(2.4) brightness(0.95)",
        }}
        draggable={false}
        onMouseDown={topRightDrag.onMouseDown}
      />

      {/* ── Log in / out ────────────────────────────────────────────────── */}
      <div
        className="absolute z-30 flex gap-5 text-[22px] cursor-grab active:cursor-grabbing select-none"
        style={{ left: authDrag.pos.x, top: authDrag.pos.y }}
        onMouseDown={authDrag.onMouseDown}
      >
        {(["log in", "log out"] as const).map((label, i) => (
          <button
            key={label}
            type="button"
            onClick={() => setLoggedIn(label === "log in")}
            className="font-black uppercase tracking-wide hover:opacity-70 transition-opacity"
            style={{
              color: "#111111",
              textShadow:
                "0 1px 0 #000, 0 3px 0 #111, 0 6px 2px rgba(0,0,0,0.75), 0 11px 4px rgba(0,0,0,0.5)",
              transform: i === 0 ? "rotate(-2deg)" : "rotate(1.5deg)",
            }}
          >
            {label}
          </button>
        ))}
      </div>

      {/* ── Status badge ────────────────────────────────────────────────── */}
      <div
        className="absolute z-20 border border-black px-2 py-1 text-[10px] uppercase tracking-[0.15em] cursor-grab active:cursor-grabbing select-none"
        style={{ left: statusDrag.pos.x, top: statusDrag.pos.y }}
        onMouseDown={statusDrag.onMouseDown}
      >
        {loggedIn ? "strava connected" : "site profile offline"}
      </div>

      {/* ── Strava profile preview (when logged in) ─────────────────────── */}
      {loggedIn && (
        <section
          className="absolute z-20 w-[min(28vw,340px)] border border-black bg-transparent px-3 py-2 text-[11px] leading-[1.45] cursor-grab active:cursor-grabbing"
          style={{ left: profileDrag.pos.x, top: profileDrag.pos.y }}
          onMouseDown={profileDrag.onMouseDown}
        >
          <div className="mb-2 text-[10px] uppercase tracking-[0.15em]">
            strava profile preview
          </div>
          <div>&ldquo;activities (past 6 months): 64&rdquo;</div>
          <div className="mt-1">&ldquo;average 10K pace: 8:21 / mi&rdquo;</div>
          <div className="mt-2 text-[10px] uppercase tracking-[0.1em]">source: strava</div>
        </section>
      )}

      {/* ── Race panel ──────────────────────────────────────────────────── */}
      <section
        className="absolute z-10 w-[min(44vw,560px)] text-[11px] cursor-grab active:cursor-grabbing"
        style={{ left: raceDrag.pos.x, top: raceDrag.pos.y }}
        onMouseDown={raceDrag.onMouseDown}
      >
        {/* Main race select */}
        <div className="w-[94%] border border-black bg-transparent px-2 py-1 ml-2 rotate-[-1.2deg]">
          <label className="flex items-center justify-between gap-3">
            <span className="whitespace-nowrap shrink-0">main race</span>
            <select
              value={primaryRaceName}
              onChange={(e) => setPrimaryRaceName(e.target.value)}
              className="bg-transparent text-right outline-none w-full"
              style={SERIF}
            >
              {PRIMARY_RACES.map((r) => (
                <option key={r.name} value={r.name}>
                  {r.name}
                </option>
              ))}
            </select>
          </label>
        </div>

        {/* Race details */}
        <div className="mt-1 w-[92%] border border-black bg-transparent px-2 py-1 ml-4 rotate-[0.4deg] text-[10px] text-stone-600 leading-[1.6]">
          <span className="text-black font-semibold">{primaryRace.location}, {primaryRace.country}</span>
          {" · "}{primaryRace.type}
          {" · "}{formatDist(primaryRace.distanceMi)}
          {" · "}{formatElev(primaryRace.elevationGainFt)}
          {primaryRace.date && (
            <>
              {" · "}
              <span>
                {new Date(primaryRace.date + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}
                {daysLeft !== null && (
                  <span className={`ml-1 font-semibold ${daysLeft < 0 ? "text-stone-400" : daysLeft <= 21 ? "text-black" : ""}`}>
                    {daysLeft < 0 ? `(${Math.abs(daysLeft)}d ago)` : daysLeft === 0 ? "(today!)" : `(${daysLeft}d)`}
                  </span>
                )}
              </span>
            </>
          )}
          {" · "}<em>{phase}</em>
        </div>

        {/* Today's workout */}
        <div className="mt-2 w-[88%] border border-black bg-transparent px-2 py-1 ml-8 rotate-[0.8deg]">
          {todayWorkout}
        </div>

        {/* Transport */}
        <div className="mt-2 w-[91%] border border-black bg-transparent px-2 py-1 ml-3 rotate-[-0.6deg]">
          {lodgingTransport}
        </div>

        {/* Support race */}
        <div className="mt-2 w-[86%] border border-black bg-transparent px-2 py-1 ml-10 rotate-[1.1deg]">
          <label className="flex items-center justify-between gap-3">
            <span className="whitespace-nowrap shrink-0">supporting race</span>
            <select
              value={supportRaceName}
              onChange={(e) => setSupportRaceName(e.target.value)}
              className="bg-transparent text-right outline-none w-full"
              style={SERIF}
            >
              {SUPPORT_RACES.map((r) => (
                <option key={r.name} value={r.name}>
                  {r.name}
                </option>
              ))}
            </select>
          </label>
        </div>

        {/* Support race details */}
        {supportRace.name !== "None" && supportRace.date && (
          <div className="mt-1 w-[84%] ml-12 text-[10px] text-stone-500 leading-[1.5]">
            {supportRace.location && `${supportRace.location} · `}
            {formatDist(supportRace.distanceMi)}
            {" · "}
            {new Date(supportRace.date + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" })}
            {(() => {
              const d = daysUntil(supportRace.date);
              if (d === null) return null;
              return <span className="ml-1 font-semibold">{d < 0 ? `(${Math.abs(d)}d ago)` : `(${d}d)`}</span>;
            })()}
          </div>
        )}

        {/* Goal toggle */}
        <div className="mt-2 flex gap-2">
          {(["finish", "target pace"] as const).map((g) => (
            <button
              key={g}
              type="button"
              onClick={() => setGoalType(g)}
              className={`border border-black px-2 py-1 text-[11px] transition-colors ${
                goalType === g ? "bg-black text-white" : "bg-transparent"
              }`}
            >
              {g}
            </button>
          ))}
          {goalType === "target pace" && (
            <input
              type="text"
              value={targetPace}
              onChange={(e) => setTargetPace(e.target.value)}
              onMouseDown={(e) => e.stopPropagation()}
              className="min-w-0 flex-1 border border-black bg-transparent px-2 py-1 outline-none text-[11px]"
              aria-label="Target pace"
              style={SERIF}
            />
          )}
        </div>

        {/* Training week */}
        <div className="mt-3 w-full">
          <div className="text-[10px] uppercase tracking-[0.12em] mb-1 ml-1">week plan — {phase}</div>
          <div className="space-y-0.5">
            {weekPlan.map((entry) => {
              const isToday = entry.day === todayDayName;
              const bg = isToday
                ? entry.emphasis === "hard" || entry.emphasis === "race"
                  ? "bg-black text-white"
                  : "bg-black/10"
                : "";
              return (
                <div
                  key={entry.day}
                  className={`flex items-start gap-2 px-2 py-0.5 text-[10px] leading-[1.5] border border-transparent ${
                    isToday ? "border-black " + bg : ""
                  } ${emphasisBg[entry.emphasis] && !isToday ? emphasisBg[entry.emphasis] : ""}`}
                >
                  <span className="w-6 shrink-0 font-semibold">{entry.day}</span>
                  <span>{entry.workout}</span>
                </div>
              );
            })}
          </div>
        </div>
      </section>

      {/* ── Coach panel ─────────────────────────────────────────────────── */}
      <section
        className="absolute z-20 w-[min(48vw,580px)] cursor-grab active:cursor-grabbing"
        style={{ left: coachDrag.pos.x, top: coachDrag.pos.y }}
        onMouseDown={coachDrag.onMouseDown}
      >
        <h2 className="text-[28px] leading-none">&ldquo;ask coach&rdquo;</h2>
        <div className="mt-2 border border-black bg-transparent px-2 py-2 text-[11px] leading-[1.35]">
          {coachHistory.length === 0 && !coachPrompt && (
            <div className="text-[10px] text-stone-400 mb-1">
              try: pace · nutrition · injury · taper · gear · vert
            </div>
          )}
          <input
            type="text"
            value={coachPrompt}
            onChange={(e) => setCoachPrompt(e.target.value)}
            onMouseDown={(e) => e.stopPropagation()}
            onKeyDown={(e) => {
              if (e.key !== "Enter") return;
              const q = coachPrompt.trim();
              if (!q) return;
              const a = coachReply(q);
              setCoachHistory((prev) => [...prev, { q, a }]);
              setCoachPrompt("");
            }}
            placeholder="I know everything"
            aria-label="Ask coach"
            className="w-full bg-transparent outline-none placeholder:text-black text-[11px]"
            style={SERIF}
          />

          {coachHistory.length > 0 && (
            <div className="mt-2 space-y-2 max-h-52 overflow-y-auto">
              {coachHistory.map((item, i) => (
                <div key={i} className="space-y-1">
                  <div className="ml-auto max-w-[82%] border border-black bg-black px-2 py-1 text-white text-[11px]">
                    {item.q}
                  </div>
                  <div className="max-w-[92%] border border-black bg-transparent px-2 py-1 text-[11px] leading-[1.45]">
                    {item.a}
                  </div>
                </div>
              ))}
              <button
                type="button"
                className="border border-black px-2 py-1 text-[11px]"
                onMouseDown={(e) => e.stopPropagation()}
                onClick={() => setCoachHistory([])}
              >
                clear
              </button>
            </div>
          )}
        </div>
      </section>

      {/* ── Chat panel ──────────────────────────────────────────────────── */}
      <section
        className="absolute z-20 w-[min(30vw,380px)] h-[430px] border border-black bg-transparent p-2 text-[11px] cursor-grab active:cursor-grabbing"
        style={{ left: chatDrag.pos.x, top: chatDrag.pos.y }}
        onMouseDown={chatDrag.onMouseDown}
      >
        {/* Tabs */}
        <div className="mb-2 flex gap-2">
          {chatTabs.map((tab) => (
            <button
              key={tab}
              type="button"
              onClick={() => setChatTab(tab)}
              className={`border border-black px-2 py-1 text-[11px] transition-colors ${
                chatTab === tab ? "bg-black text-white" : "bg-transparent"
              }`}
            >
              {tab}
            </button>
          ))}
        </div>

        <div className="flex h-[calc(100%-38px)] flex-col border border-black px-2 py-2">
          {chatTab === "local radius" && (
            <div className="mb-2 border border-black px-2 py-2">
              <div className="flex items-center justify-between gap-3 text-[11px]">
                <span>radius</span>
                <span>{radius} mi</span>
              </div>
              <input
                type="range"
                min={5}
                max={100}
                value={radius}
                onChange={(e) => setRadius(Number(e.target.value))}
                onMouseDown={(e) => e.stopPropagation()}
                className="mt-2 w-full"
              />
            </div>
          )}

          <div className="flex-1 overflow-auto border border-black px-2 py-2 leading-[1.4] space-y-1.5">
            {chatMessages
              .filter(() => true) // show all for now
              .map((m) => (
                <div key={m.id} className="text-[11px]">
                  <span className="font-semibold">{m.from}: </span>
                  {m.text}
                </div>
              ))}
            {chatMessages.length === 0 && (
              <div className="text-[10px] text-stone-400 leading-[1.5]">
                {chatTab === "friends" && "friends chat: invite friends, compare long runs, coordinate tune-up races."}
                {chatTab === "same race" && `same race chat: other runners targeting ${primaryRace.name} would appear here.`}
                {chatTab === "local radius" && `local radius chat: runners within ${radius} miles would appear here.`}
              </div>
            )}
          </div>

          {/* Chat input */}
          <div className="mt-2 border border-black flex">
            <input
              type="text"
              value={chatInput}
              onChange={(e) => setChatInput(e.target.value)}
              onMouseDown={(e) => e.stopPropagation()}
              onKeyDown={(e) => {
                if (e.key !== "Enter") return;
                const text = chatInput.trim();
                if (!text) return;
                setChatMessages((prev) => [
                  ...prev,
                  { id: Date.now(), from: loggedIn ? "you" : "anon", text },
                ]);
                setChatInput("");
              }}
              placeholder="type here..."
              className="flex-1 bg-transparent outline-none px-2 py-1 text-[11px] placeholder:text-stone-400"
              style={SERIF}
            />
            <button
              type="button"
              onMouseDown={(e) => e.stopPropagation()}
              onClick={() => {
                const text = chatInput.trim();
                if (!text) return;
                setChatMessages((prev) => [
                  ...prev,
                  { id: Date.now(), from: loggedIn ? "you" : "anon", text },
                ]);
                setChatInput("");
              }}
              className="border-l border-black px-2 py-1 text-[10px] hover:bg-black hover:text-white transition-colors"
            >
              →
            </button>
          </div>
        </div>
      </section>

      {/* ── Character ───────────────────────────────────────────────────── */}
      {/* eslint-disable-next-line @next/next/no-img-element */}
      <img
        src="/character.png"
        alt="racer1"
        className="absolute z-20 w-[min(45vw,520px)] select-none cursor-grab active:cursor-grabbing"
        style={{
          left: charDrag.pos.x,
          ...(charDrag.pos.y === -1 ? { bottom: 0 } : { top: charDrag.pos.y }),
        }}
        draggable={false}
        onMouseDown={(e) => {
          e.preventDefault();
          const rect = (e.currentTarget as HTMLElement).getBoundingClientRect();
          const startX = e.clientX;
          const startY = e.clientY;
          const origX = charDrag.pos.x;
          const origTop = rect.top + window.scrollY;
          charDrag.setPos({ x: origX, y: origTop });
          const onMove = (ev: MouseEvent) =>
            charDrag.setPos({ x: origX + ev.clientX - startX, y: origTop + ev.clientY - startY });
          const onUp = () => {
            window.removeEventListener("mousemove", onMove);
            window.removeEventListener("mouseup", onUp);
          };
          window.addEventListener("mousemove", onMove);
          window.addEventListener("mouseup", onUp);
        }}
      />

      {/* ── Profile pic overlay ─────────────────────────────────────────── */}
      {loggedIn && stravaProfilePhotoUrl && (
        /* eslint-disable-next-line @next/next/no-img-element */
        <img
          src={stravaProfilePhotoUrl}
          alt="Strava profile"
          className="absolute z-30 object-cover cursor-grab active:cursor-grabbing"
          style={{
            width: profilePicSize,
            height: profilePicSize,
            left: profilePicDrag.pos.x,
            top: profilePicDrag.pos.y,
            filter: "grayscale(1) contrast(2) brightness(0.9)",
            objectPosition: profilePicObjectPos,
            WebkitMaskImage: `radial-gradient(circle at center, black 0 ${Math.round(profilePicSize * 0.32)}px, transparent ${Math.round(profilePicSize * 0.34)}px)`,
            maskImage: `radial-gradient(circle at center, black 0 ${Math.round(profilePicSize * 0.32)}px, transparent ${Math.round(profilePicSize * 0.34)}px)`,
          }}
          draggable={false}
          onMouseDown={profilePicDrag.onMouseDown}
        />
      )}
    </main>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ThornDashboard />);
  </script>
</body>
</html>
